
<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberLingo - Lær Spansk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:wght@300;400;500;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00D9FF;
            --magenta: #FF006E;
            --lime: #FFBE0B;
            --dark: #070a1b; /* Enda mørkere for bedre kontrast */
            --dark-lighter: #121731;
        }
        body {
            background-color: var(--dark);
            color: #ffffff;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }
        h1, h2, h3, h4 {
            font-family: 'Space Mono', monospace;
            letter-spacing: -0.02em;
        }
        code, pre {
            font-family: 'Fira Code', monospace;
        }
        .neon-border-cyan {
            border: 1px solid var(--cyan);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2), inset 0 0 5px rgba(0, 217, 255, 0.1);
        }
        .neon-border-magenta {
            border: 1px solid var(--magenta);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.2), inset 0 0 5px rgba(255, 0, 110, 0.1);
        }
        .neon-text-cyan {
            color: var(--cyan);
            text-shadow: 0 0 8px rgba(0, 217, 255, 0.5);
        }
        .cyber-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .glass-panel {
            background: rgba(13, 17, 42, 0.95); /* Mer ugjennomsiktig for bedre lesbarhet */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 217, 255, 0.15);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--cyan);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: '#00D9FF',
                        magenta: '#FF006E',
                        lime: '#FFBE0B',
                        dark: '#070a1b',
                        'dark-lighter': '#121731',
                    },
                    fontFamily: {
                        heading: ['Space Mono', 'monospace'],
                        body: ['Roboto', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body class="cyber-grid min-h-screen">
    <div id="root"></div>
</body>
</html>
